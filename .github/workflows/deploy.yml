name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permisos que necesita el deploy a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; no cancela uno en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Force GitHub Actions as Pages source
        # configure-pages/enablement NO cambia el build_type si Pages ya existe
        # en modo "Deploy from a branch" (Jekyll), lo que provoca un deploy
        # legacy en paralelo que pisa el nuestro. Este PUT lo conmuta a
        # "workflow" de forma definitiva. POST como fallback si no existe.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          api="https://api.github.com/repos/${{ github.repository }}/pages"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$api" -d '{"build_type":"workflow"}')
          echo "PUT /pages -> $code"
          if [ "$code" = "404" ]; then
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$api" -d '{"build_type":"workflow"}')
            echo "POST /pages -> $code"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install
        run: npm ci

      - name: Build
        # base /keto/ (default en vite.config.js) => sirve en yuizz.github.io/keto/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
