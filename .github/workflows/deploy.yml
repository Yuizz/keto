name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permisos que necesita el deploy a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; no cancela uno en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        # enablement: true conmuta Pages a modo "GitHub Actions" aunque el repo
        # estuviera en "Deploy from a branch". Evita tener que tocar Settings.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install
        run: npm ci

      - name: Build
        # base /keto/ (default en vite.config.js) => sirve en yuizz.github.io/keto/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
